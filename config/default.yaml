server:
  host: 127.0.0.1
  port: 8080
  cors_origin: null

frontend:
  dist: frontend/dist

runner:
  queue_capacity: 20
  workers: 2
  timeout_secs: 10
  cleanup_timeout_secs: 2
  max_output_bytes: 65536
  max_process_output_bytes: 4194304
  # 128 MiB workspace + 64 MiB /tmp + 64 MiB process headroom fit inside
  # each 256 MiB container. Advanced cache uses an image-seeded volume.
  workspace_tmpfs_bytes: 134217728
  container_memory_bytes: 268435456
  container_cpus: 0.5
  container_pids_limit: 128
  tmp_tmpfs_bytes: 67108864
  process_headroom_bytes: 67108864
  core_ulimit: "0:0"
  image: rust-runner:1.95
  workspace_root: /tmp/rust-daily-runs
  podman_path: podman

validation:
  max_files: 8
  max_file_bytes: 65536
  max_total_bytes: 262144
  max_path_bytes: 240
  max_path_component_bytes: 120
  max_diagnostic_snippets_per_case: 16
  max_diagnostic_snippet_bytes: 512
  max_diagnostic_total_bytes: 8192

api:
  # Upper bound allows JSON to escape every admitted input
  # byte as \u00XX. Settings loading rejects smaller values.
  max_json_payload_bytes: 1600000
