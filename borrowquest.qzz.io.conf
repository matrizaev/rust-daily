limit_req_zone $binary_remote_addr zone=rust_daily_run:10m rate=6r/m;

server {
        listen 80;
        listen [::]:80;

        server_name borrowquest.qzz.io;

        return 301 https://$host$request_uri;
}

server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;

        server_name borrowquest.qzz.io;

        ssl_certificate /etc/ssl/certs/borrowquest.qzz.io.pem;
        ssl_certificate_key /etc/ssl/private/borrowquest.qzz.io.key;

        include /etc/nginx/cloudflare-real-ip.conf;

        # Must remain above api.max_json_payload_bytes in config/default.yaml.
        client_max_body_size 2m;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), geolocation=(), microphone=(), payment=(), usb=()" always;

        location = /run {
                limit_req zone=rust_daily_run burst=4 nodelay;
                limit_req_status 429;

                proxy_pass http://127.0.0.1:8080;
                proxy_http_version 1.1;

                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Host $host;
                proxy_set_header X-Forwarded-Proto $scheme;

                proxy_connect_timeout 5s;
                proxy_send_timeout 60s;
                proxy_read_timeout 60s;
        }

        location / {
                proxy_pass http://127.0.0.1:8080;
                proxy_http_version 1.1;

                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Host $host;
                proxy_set_header X-Forwarded-Proto $scheme;

                proxy_connect_timeout 5s;
                proxy_send_timeout 60s;
                proxy_read_timeout 60s;
        }
}
