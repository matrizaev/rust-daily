limit_req_zone $binary_remote_addr zone=rust_daily_run:10m rate=6r/m;

map $uri $rust_daily_cache_control {
        default "no-cache, no-store, must-revalidate";
        / "no-cache, must-revalidate";
        /index.html "no-cache, must-revalidate";
        /manifest.webmanifest "no-cache, must-revalidate";
        /favicon.svg "no-cache, must-revalidate";
        /sw.js "no-cache, no-store, must-revalidate";
        ~^/icons/ "no-cache, must-revalidate";
        ~^/assets/ "public, max-age=31536000, immutable";
        ~^/workbox-[^/]+\.js$ "public, max-age=31536000, immutable";
        ~^/content/lessons/.+\.json$ "public, max-age=31536000, immutable";
}

server {
        listen 80;
        listen [::]:80;

        server_name borrowquest.site;

        location ^~ /.well-known/acme-challenge/ {
                root /var/www12/acme-challenge;
                default_type "text/plain";
        }

        location / {
                return 301 https://$host$request_uri;
        }
}

server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;

        server_name borrowquest.site;

        ssl_certificate /etc/ssl/certs/borrowquest.site.pem;
        ssl_certificate_key /etc/ssl/private/borrowquest.site.key;

        # Must remain above api.max_json_payload_bytes in config/default.yaml.
        client_max_body_size 2m;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), geolocation=(), microphone=(), payment=(), usb=()" always;
        add_header Cache-Control $rust_daily_cache_control;

        location = /run {
                limit_req zone=rust_daily_run burst=4 nodelay;
                limit_req_status 429;

                proxy_pass http://127.0.0.1:8080;
                proxy_http_version 1.1;

                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Host $host;
                proxy_set_header X-Forwarded-Proto $scheme;

                proxy_connect_timeout 5s;
                proxy_send_timeout 60s;
                proxy_read_timeout 60s;
        }

        location = /metrics {
                allow 127.0.0.1;
                allow ::1;
                deny all;

                proxy_pass http://127.0.0.1:8080;
                proxy_http_version 1.1;

                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Host $host;
                proxy_set_header X-Forwarded-Proto $scheme;

                proxy_connect_timeout 5s;
                proxy_send_timeout 10s;
                proxy_read_timeout 10s;
        }

        location / {
                proxy_pass http://127.0.0.1:8080;
                proxy_http_version 1.1;

                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Host $host;
                proxy_set_header X-Forwarded-Proto $scheme;

                proxy_connect_timeout 5s;
                proxy_send_timeout 60s;
                proxy_read_timeout 60s;
        }
}
